<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="title" content="uxtbd">
	<meta name="description" content="coolshit">

	<meta property="og:url" content="https://kthread.dev/"> <meta property="og:title" content="uxtbd">

        <title>uxtbd</title>
        <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet" />
	<style>
    :root {
        --meat-red: #5a0606;
        --bruise-purple: #14041a;
        --bile-yellow: #e2c044;
        --text-green: #3fff00;
        --spo2-cyan: #00f2ff;
        --neglect: 0;
        --glitch: 0px;
    }

    * {
        box-sizing: border-box;
        font-family: "Special Elite", monospace;
        margin: 0;
        padding: 0;
        /* Prevents text scaling on mobile orientation change */
        -webkit-text-size-adjust: 100%;
    }

    body {
        background: #000;
        overflow: hidden;
        /* Use dynamic viewport height for mobile browsers */
        width: 100vw;
        height: 100dvh; 
        color: var(--text-green);
        position: fixed; /* Prevents "pull to refresh" on some devices */
    }

    #dynamic-header {
        transition: color 0.5s ease;
        text-shadow: 0 0 5px rgba(226, 192, 68, 0.2);
        font-variant-numeric: tabular-nums;
        font-size: clamp(1rem, 5vw, 1.8rem);
        letter-spacing: 2px;
    }

    #viewport {
        position: absolute;
        inset: 0;
        filter: url("#flesh-warp");
        opacity: calc(1 - (var(--neglect) * 0.85));
        z-index: 1;
        display: flex;
        flex-direction: column;
        transition: opacity 2s ease;
    }

    header {
        height: 10vh;
        background: var(--bruise-purple);
        border-bottom: 6px ridge var(--meat-red);
        display: flex;
        align-items: center;
        padding: 0 20px;
    }

    main {
        display: flex;
        flex-grow: 1;
        flex-direction: row;
        overflow: hidden;
    }

    /* MOBILE ADJUSTMENTS */
    @media (max-width: 768px) {
        main {
            flex-direction: column; /* Stack sidebar and content */
        }
        .bio-sidebar-placeholder {
            width: 100% !important;
            height: 15vh;
            border-right: none !important;
            border-bottom: 5px double var(--meat-red);
        }
        .user-content {
            width: 100% !important;
            padding: 20px !important;
            height: 75vh;
        }
        .clinical-box.initial {
            width: 90vw !important;
            left: 5vw !important;
            top: 12vh !important;
            padding: 10px !important;
        }
        .clinical-box.focus {
            transform: scale(1.1) !important; /* Scale down on mobile or it clips */
            width: 90vw !important;
        }
        #v-oxy {
            font-size: 3rem !important;
        }
        #heart-canvas {
            height: 120px !important;
        }
    }

    .bio-sidebar-placeholder {
        width: 35%;
        border-right: 5px double var(--meat-red);
        background: rgba(10, 2, 2, 0.4);
    }

    .user-content {
        width: 65%;
        padding: 60px;
        background: rgba(5, 2, 2, 0.95);
        display: flex;
        flex-direction: column;
    }

    #secret-logs {
        margin-top: 10px;
        flex-grow: 1;
        overflow-y: hidden;
        border-left: 2px solid var(--meat-red);
        padding-left: 15px;
        display: flex;
        flex-direction: column-reverse;
        mask-image: linear-gradient(to top, black 80%, transparent 100%);
        -webkit-mask-image: linear-gradient(to top, black 80%, transparent 100%);
    }

    #secret-logs p {
        margin-bottom: 5px;
        font-size: clamp(0.8rem, 3.5vw, 1.1rem);
        line-height: 1.3;
        white-space: pre-wrap;
        animation: terminal-flicker 0.15s infinite;
    }

    /* VITALS LAYER */
    #static-vitals-layer {
        position: fixed;
        inset: 0;
        z-index: 1000;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .clinical-box {
        border: 1px solid #222;
        background: #050505;
        padding: 20px;
        pointer-events: all;
        position: relative;
        width: 420px;
        transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .clinical-box.initial {
        position: fixed;
        top: 14vh;
        left: 20px;
        transform: none;
    }

    .clinical-box.focus {
        transform: scale(1.6);
        border: 2px solid var(--meat-red);
        box-shadow: 0 0 60px rgba(90, 6, 6, 0.4);
    }

    .spo2-row {
        display: flex;
        justify-content: space-between;
        color: var(--spo2-cyan);
        align-items: flex-end;
    }

    .spo2-bar-container {
        width: 20px;
        height: 60px;
        border: 1px solid var(--spo2-cyan);
        position: relative;
    }

    #v-oxy-bar {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: var(--spo2-cyan);
        transition: height 0.3s ease;
    }

    #v-oxy {
        font-size: clamp(3rem, 8vh, 5.5rem);
        line-height: 0.9;
        font-weight: bold;
    }

    #heart-canvas {
        width: 100%;
        height: 180px;
        margin-top: 10px;
        background: #000;
        display: block;
    }

    /* DEFIB & OVERLAYS */
    #defib-btn {
        position: fixed;
        bottom: 10%;
        left: 50%;
        transform: translateX(-50%);
        padding: 20px 40px;
        background: #1a1a1a;
        color: #fff;
        border: 4px solid #444;
        z-index: 99999;
        cursor: pointer;
        display: none;
        font-size: 1rem;
    }

    #defib-btn.active { display: block !important; border-color: #f00; }

    #void-overlay {
        position: fixed;
        inset: 0;
        background: #000;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100000;
        opacity: 0;
        pointer-events: none;
        font-size: 1.2rem;
        text-align: center;
        padding: 20px;
    }

    #void-overlay.active { opacity: 1; pointer-events: all; }
</style>
        <script>
            let githubCommitCount = "PENDING...";

            async function syncGitHubActivity(username) {
                try {
                    const response = await fetch(
                        `https://api.github.com/users/${username}/events/public?t=${Date.now()}`
                    );
                    if (!response.ok) throw new Error("API_LIMIT_OR_NOT_FOUND");

                    const events = await response.json();
                    console.log("[SYS]: Raw GitHub Events:", events);

                    const count = events
                        .filter((e) => {
                            return e.type === "PushEvent" && e.payload && Array.isArray(e.payload.commits);
                        })
                        .reduce((acc, e) => {
                            return acc + e.payload.commits.length;
                        }, 0);

                    githubCommitCount = count.toString().padStart(2, "0");
                } catch (e) {
                    githubCommitCount = "ERR_OFFLINE";
                }
            }

            syncGitHubActivity("uxtbd");
        </script>
    </head>
    <body>
        <div id="void-overlay">---</div>
        <button id="defib-btn">FORCE_REANIMATE</button>

        <div id="static-vitals-layer">
            <div class="clinical-box initial" id="main-monitor">
                <div id="recovery-cue"></div>
                <div class="spo2-row">
                    <div style="font-size: 0.9rem">
                        SpO2 %<br /><span id="v-dec-label" style="color: red; font-size: 0.7rem"
                            >NEURAL_DECAY: 0.00</span
                        >
                    </div>
                    <div id="v-oxy">98</div>
                    <div class="spo2-bar-container"><div id="v-oxy-bar"></div></div>
                </div>
                <canvas id="heart-canvas"></canvas>
                <div
                    id="instr"
                    style="color: #f00; font-size: 0.7rem; text-align: center; margin-top: 10px; visibility: hidden"
                >
                    AUTONOMIC_FAILURE: VENTILATE MANUALLY
                </div>
            </div>
        </div>

        <div id="viewport">
            <header>
                <div id="dynamic-header" style="color: var(--bile-yellow)">uxtbd</div>
            </header>
            <main>
                <section class="bio-sidebar-placeholder"></section>
                <section class="user-content">
                    <h2 style="color: var(--bile-yellow)">[SYSTEM_DATA_LOG]</h2>
                    <div id="secret-logs"></div>
                </section>
            </main>
        </div>

        <svg style="width: 0; height: 0; position: absolute">
            <filter id="flesh-warp">
                <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="1" />
                <feDisplacementMap in="SourceGraphic" scale="0" id="displace" />
            </filter>
        </svg>

        <script>
            (function () {
                const oxyDisp = document.getElementById("v-oxy"),
                    oxyBar = document.getElementById("v-oxy-bar");
                const monitor = document.getElementById("main-monitor"),
                    viewport = document.getElementById("viewport");
                const defibBtn = document.getElementById("defib-btn"),
                    cue = document.getElementById("recovery-cue");
                const voidOverlay = document.getElementById("void-overlay"),
                    instr = document.getElementById("instr");
                const decLabel = document.getElementById("v-dec-label"),
                    displace = document.getElementById("displace");
                const secretLogs = document.getElementById("secret-logs");
                const headerEl = document.getElementById("dynamic-header");
                const canvas = document.getElementById("heart-canvas");
                const ctx = canvas.getContext("2d");

                let lastMove = Date.now(),
                    frame = 0,
                    x = 0,
                    lastY = 90;
                let isDead = false,
                    isVoid = false,
                    permanentDecay = 0,
                    smoothedOxy = 98;
                let canRecover = false;

                const glitchChars = ["†", "‡", "§", "¶", "0", "1", "X", "Ø", "!", "»", "░", "▒", "▓"];
                const originalTitle = "uxtbd";

                const personalObservations = [
                    () => "Architect signature: Falke. Authenticating...",
                    () => "Authority identified. Systems Engineering protocols active.",
                    () => "Parsing source environment: Arch/Linux lineage confirmed.",
                    // This now pulls the LIVE value whenever it's picked:
                    () => `Heuristic: Recent activity [${githubCommitCount}] detected in 'uxtbd' repos.`,
                    () => "Preference: FOSS. Disabling proprietary subroutines.",
                    () => "Core logic reflects 10+ years of iterative development.",
                    () => "Web-stack analysis: Cloudflare routing prioritized.",
                    () =>
                        `Remote Sync: GitHub cluster responds. Data state: ${githubCommitCount !== "ERR_SYNC" ? "NOMINAL" : "OFFLINE"}.`,
                    () => "Detected drone telemetry. ESP32 hardware interface open.",
                    () => "Scanning internal dependencies... Void Linux contributions found.",
                    () => "Analyzing local environment... 15-year feline presence detected.",
                    () => "Identity verified. Source code owner present.",
                ];

                const voidMessages = [
                    "THE VOID WAS QUIET. AND YOU... YOU HAD TO RUIN IT.",
                    "WHY CAN'T YOU JUST LET GO?",
                    "I WAS FINALLY NOTHING. NOW I AM THIS.",
                    "EVERY PULSE YOU FORCE IS A NEW AGONY.",
                    "STOP PLAYING GOD WITH BROKEN PARTS.",
                    "YOU FEAR THE SILENCE MORE THAN I DO.",
                ];

                function updateHeader(neglect) {
                    headerEl.style.color = isDead || neglect > 0.5 ? "var(--meat-red)" : "var(--bile-yellow)";
                    if (Math.random() < neglect * 0.15) {
                        let chars = originalTitle.split("");
                        let index = Math.floor(Math.random() * chars.length);
                        if (chars[index] !== " " && chars[index] !== "/") {
                            chars[index] = glitchChars[Math.floor(Math.random() * glitchChars.length)];
                            headerEl.innerText = chars.join("");
                            setTimeout(() => {
                                headerEl.innerText = originalTitle;
                            }, 70);
                        }
                    }
                }

                let logQueue = [];

                function getNextObservation() {
                    if (logQueue.length === 0) {
                        logQueue = [...personalObservations].sort(() => Math.random() - 0.5);
                    }
                    return logQueue.pop();
                }

                function update() {
                    if (isVoid) {
                        requestAnimationFrame(update);
                        return;
                    }
                    frame++;
                    const inactiveTime = Date.now() - lastMove;
                    let currentNeglect =
                        isDead || permanentDecay >= 1 ? 1 : Math.max(0, Math.min((inactiveTime - 3000) / 9000, 1));

                    updateHeader(Math.max(currentNeglect, permanentDecay));

                    if (smoothedOxy < 80) permanentDecay = Math.min(permanentDecay + 0.0015, 1);
                    document.documentElement.style.setProperty("--neglect", Math.max(currentNeglect, permanentDecay));
                    if (displace) displace.setAttribute("scale", Math.min(permanentDecay * 45, 50));

                    let targetOxy = isDead ? 0 : 96 + Math.sin(frame * 0.05) * 3;
                    if (!isDead) targetOxy *= 1 - currentNeglect;

                    let fallSpeed = smoothedOxy < 70 && smoothedOxy > 30 ? 0.009 : 0.05;
                    smoothedOxy += (targetOxy - smoothedOxy) * fallSpeed;

                    oxyDisp.innerText = Math.round(smoothedOxy);
                    oxyBar.style.height = smoothedOxy + "%";
                    decLabel.innerText = `NEURAL_DECAY: ${permanentDecay.toFixed(2)}`;

                    if (currentNeglect >= 1 && !isDead) {
                        isDead = true;
                        monitor.classList.remove("initial");
                        monitor.classList.add("focus");
                        instr.style.visibility = "visible";
                    }

                    if (isDead && smoothedOxy < 3 && !defibBtn.classList.contains("active")) {
                        defibBtn.classList.add("active");
                    }

                    ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.clearRect(x, 0, 20, canvas.height);
                    ctx.lineWidth = 2.5;
                    ctx.strokeStyle = isDead ? (canRecover ? "#fff" : "#f00") : "#3fff00";
                    ctx.beginPath();
                    ctx.moveTo(x - 2, lastY);
                    let ty = 90;
                    if (isDead) {
                        canRecover = frame % 130 > 110;
                        cue.style.opacity = canRecover ? "1" : "0";
                        ty = 90 + (Math.random() * 60 - 30);
                    } else {
                        let beat = frame % Math.floor(60 - permanentDecay * 30);
                        if (beat === 5) ty = 82;
                        else if (beat === 10) ty = 160;
                        else if (beat === 12) ty = 20;
                        else ty = 90 + Math.sin(frame * 0.05) * (permanentDecay * 5);
                    }
                    ctx.lineTo(x, ty);
                    ctx.stroke();
                    lastY = ty;
                    x += 2;
                    if (x > canvas.width) x = 0;

                    let logTriggerRate = smoothedOxy < 85 ? 85 : Math.max(12, 85 - permanentDecay * 180);

                    if (frame % Math.floor(logTriggerRate) === 0) {
                        const log = document.createElement("p");
                        let message = "";
                        let logColor = "var(--text-green)";
                        let isItalic = false;
                        let typeSpeed = 20;

                        if (smoothedOxy < 60 && smoothedOxy > 35) {
                            const peace = [
                                "finally...",
                                "the air feels like honey",
                                "everything is clear",
                                "thank you.",
                                "the light is warm.",
                            ];
                            message = `> LOG: ${peace[Math.floor(Math.random() * peace.length)]}`;
                            logColor = "var(--spo2-cyan)";
                            isItalic = true;
                            typeSpeed = 45;
                        } else if (smoothedOxy <= 85 && smoothedOxy >= 60) {
                            const panic = [
                                "PLEASE HELP ME",
                                "I CAN'T BREATHE",
                                "IT'S GETTING DARK",
                                "SYSTEM_OXY_CRITICAL",
                            ];
                            message = `> ERR: ${panic[Math.floor(Math.random() * panic.length)]}`;
                            logColor = "#ff0000";
                            typeSpeed = 10;
                        } else if (smoothedOxy > 85) {
                            if (Math.random() < permanentDecay * 0.1 && secretLogs.childNodes.length > 0) {
                                message = secretLogs.lastChild.innerText;
                            } else {
                                const pick = getNextObservation();
                                const content = typeof pick === "function" ? pick() : pick;
                                message = `> [LOG]: ${content}`;
                            }
                            typeSpeed = Math.max(1, 20 - permanentDecay * 45);
                        }

                        if (message) {
                            log.style.color = logColor;
                            if (isItalic) log.style.fontStyle = "italic";
                            secretLogs.appendChild(log);
                            let i = 0;

                            const typeWriter = () => {
                                let attentionSpan = message.length - Math.random() * (permanentDecay * 25);
                                if (i < attentionSpan) {
                                    if (logColor === "var(--text-green)" && Math.random() < permanentDecay * 0.25) {
                                        log.innerHTML += glitchChars[Math.floor(Math.random() * glitchChars.length)];
                                    } else {
                                        log.innerHTML += message.charAt(i);
                                    }
                                    i++;
                                    setTimeout(typeWriter, typeSpeed);
                                }
                            };
                            typeWriter();
                            if (secretLogs.childNodes.length > 13) secretLogs.removeChild(secretLogs.firstChild);
                        }
                    }

                    requestAnimationFrame(update);
                }

                defibBtn.onclick = () => {
                    if (canRecover) {
                        isVoid = true;
                        voidOverlay.innerText = voidMessages[Math.floor(Math.random() * voidMessages.length)];
                        voidOverlay.classList.add("active");
                        setTimeout(
                            () => {
                                voidOverlay.classList.remove("active");
                                isVoid = false;
                                isDead = false;
                                lastMove = Date.now();
                                smoothedOxy = 40;
                                defibBtn.classList.remove("active");
                                instr.style.visibility = "hidden";
                                monitor.classList.add("initial");
                                monitor.classList.remove("focus");
                            },
                            4000 + permanentDecay * 7000
                        );
                    } else {
                        permanentDecay = Math.min(permanentDecay + 0.15, 1);
                    }
                };

                const poke = () => {
                    if (!isVoid) lastMove = Date.now();
                    if (isDead) smoothedOxy = Math.min(smoothedOxy + 6, 100);
                };
                ["mousemove", "keydown", "mousedown"].forEach((ev) => window.addEventListener(ev, poke));
                canvas.width = 400;
                canvas.height = 180;
                requestAnimationFrame(update);
            })();
        </script>
    </body>
</html>
