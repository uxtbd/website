name: Build-Time Version Stamper

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Generate Localized Timestamp and Hash
        id: vars
        run: |
          # Generates a clean date format: YYYY-MM-DD @ HH:MM UTC
          echo "TIMESTAMP=$(date -u +'%Y-%m-%d @ %H:%M UTC')" >> $GITHUB_ENV
          # Grabs the short 7-character commit hash
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Overwrite Placeholder String inside HTML
        run: |
          # Uses sed to find %LAST_REVISED% and replace it with our environment variables
          sed -i "s/%LAST_REVISED%/commit #${{ env.COMMIT_HASH }} on ${{ env.TIMESTAMP }}/g" index.html

      - name: Commit Updated Document
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "inject build-time version stamps [skip ci]"
          file_pattern: 'index.html'
